meta:
  environment: node
  toolchain:
    name: npm
    version: "20"
build:
  skip: false
  additionalCommands: cd backend && npm install && npx playwright install --with-deps chromium
  artifacts:
    "backend/*": /
run:
  scriptName: server.js
  scriptArguments: null
  nodeArguments: null
  command: npm run start
  persistenceMount: /data
  containerPort: "3001"
  servicePort: "80"